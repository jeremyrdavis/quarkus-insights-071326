# Hibernate SQL logging
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true
quarkus.hibernate-orm.log.bind-parameters=true

%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true

# Bind to all interfaces so the sandbox port can be published to the host
%dev.quarkus.http.host=0.0.0.0

# Quinoa — proxy to Vite dev server in dev mode
%dev.quarkus.quinoa.dev-server.port=5173

# Quinoa — serve index.html for all unmatched paths (SPA client-side routing)
quarkus.quinoa.enable-spa-routing=true

# Quinoa — Vite default output directory
quarkus.quinoa.build-dir=dist

# Quinoa — don't intercept REST API paths; let JAX-RS handle them
quarkus.quinoa.ignored-path-prefixes=/cfp,/presenters,/session-proposals,/q

# CFP outbox publisher
cfp.outbox.publisher.every=30s
cfp.outbox.publisher.batch-size=20
cfp.outbox.publisher.max-attempts=5
cfp.outbox.publisher.retry-delay=5s

# Communications delivery worker
communications.delivery.every=1s
communications.delivery.batch-size=20
communications.delivery.max-attempts=5
communications.delivery.retry-delay=5s
communications.delivery.stale-processing-timeout=5m

# Email
quarkus.mailer.from=no-reply@conference.example

# Tests drive the application services directly; disable schedulers and mock the mailer
%test.quarkus.scheduler.enabled=false
%test.quarkus.mailer.mock=true
